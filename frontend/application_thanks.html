<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanks For Applying</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');

        :root {
            --bg: #f7efe5;
            --surface: #fffaf3;
            --ink: #18243d;
            --muted: #5c6882;
            --accent: #df6d2d;
            --secondary: #0f766e;
            --line: rgba(24, 36, 61, 0.12);
            --shadow: 0 30px 60px rgba(24, 36, 61, 0.12);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1rem;
            font-family: 'Manrope', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(223, 109, 45, 0.14), transparent 24%),
                radial-gradient(circle at bottom right, rgba(15, 118, 110, 0.14), transparent 24%),
                var(--bg);
            color: var(--ink);
        }
        .card {
            width: min(760px, 100%);
            background: rgba(255,250,243,0.9);
            border: 1px solid var(--line);
            border-radius: 34px;
            box-shadow: var(--shadow);
            padding: 3rem;
        }
        .badge {
            width: 76px;
            height: 76px;
            border-radius: 24px;
            display: grid;
            place-items: center;
            font-size: 2rem;
            color: #fff;
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            margin-bottom: 1.25rem;
        }
        h1 {
            font-size: clamp(2.2rem, 4vw, 3.4rem);
            line-height: 1;
            letter-spacing: -0.05em;
            margin-bottom: 1rem;
        }
        p {
            color: var(--muted);
            line-height: 1.75;
            font-size: 1.02rem;
            margin-bottom: 0.9rem;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.9rem;
            margin-top: 1.8rem;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            text-decoration: none;
            font-weight: 800;
            border-radius: 999px;
            padding: 0.95rem 1.4rem;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-outline { border: 1px solid var(--line); color: var(--ink); background: #fff; }
    </style>
</head>
<body>
    <section class="card">
        <div class="badge"><i class="fa-solid fa-heart"></i></div>
        <h1>Thanks, {{ student_name }}.</h1>
        <p>Your request to join <strong>{{ course_title }}</strong> has been sent to the LMS admin.</p>
        <p>Once the invitation is accepted, you can log in with the email and password you just created and start learning inside the course.</p>
        <div class="actions">
            <a href="/" class="btn btn-outline"><i class="fa-solid fa-compass"></i> Back To LMS Dashboard</a>
            <a href="/login" class="btn btn-primary"><i class="fa-solid fa-right-to-bracket"></i> Go To Login</a>
        </div>
    </section>
</body>
</html>
