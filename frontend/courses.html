<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Courses - LMS Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <aside class="sidebar">
        <a href="admin.html" class="brand">
            <i class="fa-solid fa-graduation-cap brand-icon"></i>
            <span>LMS Admin</span>
        </a>
        <ul class="nav-links">
            <li><a href="admin.html" class="nav-item"><i class="fa-solid fa-house"></i> Dashboard</a></li>
            <li><a href="students.html" class="nav-item"><i class="fa-solid fa-users"></i> Students</a></li>
            <li><a href="courses.html" class="nav-item active"><i class="fa-solid fa-book"></i> Courses</a></li>
            <li><a href="projects.html" class="nav-item"><i class="fa-solid fa-file-code"></i> Projects</a></li>
            <li><a href="/admin/invitations" class="nav-item"><i class="fa-solid fa-envelope-open-text"></i> Invitations</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="animate-fade-in">
            <h1 class="page-title">Manage Courses</h1>
            <div class="user-profile">
                <img src="https://ui-avatars.com/api/?name=System+Admin&background=4318FF&color=fff" alt="Admin">
            </div>
        </header>

        <div class="table-header animate-fade-in" style="animation-delay: 0.1s;">
            <h2>Course Catalog</h2>
            <button class="btn btn-primary" onclick="openModal('addCourseModal')">
                <i class="fa-solid fa-plus"></i> Create Course
            </button>
        </div>

        <section class="course-grid animate-fade-in" style="animation-delay: 0.2s;">
            {% for course in courses %}
            <div class="course-card">
                <div class="course-header" style="background: linear-gradient(135deg, {% if loop.index0 % 3 == 0 %}#868CFF 0%, var(--primary){% elif loop.index0 % 3 == 1 %}#01B574 0%, #007a4e{% else %}#FFCE20 0%, #c29900{% endif %} 100%);">
                    <span class="course-level">{{ course.level }}</span>
                </div>
                <div class="course-body">
                    <h3 class="course-title">{{ course.title }}</h3>
                    <p class="course-desc">{{ course.description }}</p>
                </div>
                <div class="course-footer">
                    <div class="course-meta">
                        <i class="fa-solid fa-clock"></i> {{ course.duration }} Hrs
                    </div>
                    <div class="actions">
                        <a href="/admin/course/{{ course.course_id }}" class="btn btn-outline" style="padding: 0.3rem 0.8rem; font-size: 0.8rem;"><i class="fa-solid fa-pen"></i> Edit Modules</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </section>
    </main>

    <!-- Add Course Modal -->
    <div class="modal" id="addCourseModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create New Course</h2>
                <button class="modal-close" onclick="closeModal('addCourseModal')"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="addCourseForm" method="POST" action="/add_course">
                <div class="form-group">
                    <label for="title">Course Title</label>
                    <input type="text" name="title" id="title" placeholder="e.g. Master Python" required>
                </div>
                <div class="form-group">
                    <label for="desc">Description</label>
                    <textarea name="description" id="desc" rows="3" placeholder="Course outline..." required></textarea>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label for="duration">Duration (Hrs)</label>
                        <input type="number" name="duration" id="duration" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="level">Level</label>
                        <select name="level" id="level">
                            <option value="Beginner">Beginner</option>
                            <option value="Intermediate">Intermediate</option>
                            <option value="Advanced">Advanced</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">Publish Course</button>
            </form>
        </div>
    </div>

    <script>
        function openModal(id) {
            document.getElementById(id).classList.add('open');
        }
        function closeModal(id) {
            document.getElementById(id).classList.remove('open');
        }
    </script>
</body>
</html>
